<nav class="navbar navbar-expand-lg glass-effect sticky-top border-bottom py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <div class="bg-primary rounded-3 p-1 me-2 d-flex align-items-center justify-content-center"
        style="width: 35px; height: 35px;">
        <i class="bi bi-mortarboard-fill text-white fs-5"></i>
      </div>
      <span class="fw-bold fs-4 gradient-text">ClassHub</span>
    </a>

    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <i class="bi bi-list fs-2"></i>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <ng-container *ngIf="authService.currentUser$ | async as user; else noUser">
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium" routerLink="/dashboard" routerLinkActive="text-primary">Dashboard</a>
          </li>
          <li class="nav-item ms-lg-3 dropdown">
            <a class="nav-link d-flex align-items-center dropdown-toggle" href="#" id="profileDropdown" role="button"
              data-bs-toggle="dropdown">
              <img [src]="getAvatar(user)" class="rounded-circle border me-2" width="35" height="35" alt="profile">
              <span class="fw-medium text-dark">{{ user.name }}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg p-2 mt-2">
              <li class="px-3 py-2 border-bottom mb-2">
                <small class="text-muted d-block">Signed in as</small>
                <span class="fw-semibold">{{ user.email }}</span>
                <span class="badge bg-light text-primary ms-1 border">{{ user.role | uppercase }}</span>
              </li>
              <li><a class="dropdown-item rounded-2 py-2" routerLink="/profile"><i class="bi bi-person me-2"></i>
                  Profile</a></li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item rounded-2 py-2 text-danger" (click)="logout()" style="cursor: pointer;"><i
                    class="bi bi-box-arrow-right me-2"></i> Sign Out</a></li>
            </ul>
          </li>
        </ng-container>
        <ng-template #noUser>
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium" routerLink="/login">Login</a>
          </li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-primary shadow-sm px-4" routerLink="/register">Get Started</a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
