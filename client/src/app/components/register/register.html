<div class="container-fluid bg-light min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg p-4 animate-fade-in">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Join ClassHub</h2>
                        <p class="text-muted">Create your account to start learning or teaching</p>
                    </div>

                    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Full Name</label>
                            <input type="text" class="form-control py-2 shadow-none" name="name"
                                [(ngModel)]="userData.name" required placeholder="John Doe">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <input type="email" class="form-control py-2 shadow-none" name="email"
                                [(ngModel)]="userData.email" required placeholder="name@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Password</label>
                            <input type="password" class="form-control py-2 shadow-none" name="password"
                                [(ngModel)]="userData.password" required minlength="6"
                                placeholder="At least 6 characters">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium d-block">I am a...</label>
                            <div class="d-flex gap-3">
                                <input type="radio" class="btn-check" name="role" id="studentRole" value="student"
                                    [(ngModel)]="userData.role">
                                <label class="btn btn-outline-primary flex-grow-1 py-2" for="studentRole">
                                    <i class="bi bi-mortarboard me-2"></i> Student
                                </label>

                                <input type="radio" class="btn-check" name="role" id="teacherRole" value="teacher"
                                    [(ngModel)]="userData.role">
                                <label class="btn btn-outline-primary flex-grow-1 py-2" for="teacherRole">
                                    <i class="bi bi-person-workspace me-2"></i> Teacher
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 shadow-none"
                            [disabled]="!registerForm.form.valid || isLoading">
                            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                            {{ isLoading ? 'Creating account...' : 'Create Account' }}
                        </button>

                        <div class="text-center">
                            <p class="text-muted small">Already have an account? <a routerLink="/login"
                                    class="text-primary fw-medium text-decoration-none">Sign in</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
