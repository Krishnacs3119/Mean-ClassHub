<div class="container-fluid bg-light min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg p-4 animate-fade-in">
                    <div class="text-center mb-4">
                        <div class="bg-primary-subtle rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                            style="width: 70px; height: 70px;">
                            <i class="bi bi-person-lock text-primary fs-1"></i>
                        </div>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Enter your credentials to access your classroom</p>
                    </div>

                    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i
                                        class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0 py-2 shadow-none"
                                    name="email" [(ngModel)]="credentials.email" required
                                    placeholder="name@example.com">
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-medium">Password</label>
                                <a routerLink="/forgot-password" class="text-primary text-decoration-none small">Forgot
                                    Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i
                                        class="bi bi-key text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0 py-2 shadow-none"
                                    name="password" [(ngModel)]="credentials.password" required placeholder="••••••••">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 shadow-none"
                            [disabled]="!loginForm.form.valid || isLoading">
                            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                            {{ isLoading ? 'Signing in...' : 'Sign In' }}
                        </button>

                        <div class="text-center">
                            <p class="text-muted small">Don't have an account? <a routerLink="/register"
                                    class="text-primary fw-medium text-decoration-none">Create an account</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
